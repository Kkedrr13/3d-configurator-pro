<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate 3D Configurator Pro | White Label Ready</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #050b1a;
        }
        
        :root {
            --theme-dark-bg: rgba(0, 0, 0, 0.75);
            --theme-dark-border: rgba(255, 255, 255, 0.15);
            --theme-primary: #3b82f6;
            --theme-primary-grad-start: #3b82f6;
            --theme-primary-grad-end: #8b5cf6;
            --theme-text: #ffffff;
            --theme-text-secondary: rgba(255, 255, 255, 0.7);
            --theme-panel-blur: 20px;
            --theme-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body[data-theme="light"] {
            --theme-dark-bg: rgba(255, 255, 255, 0.85);
            --theme-dark-border: rgba(0, 0, 0, 0.1);
            --theme-text: #1e293b;
            --theme-text-secondary: #475569;
        }
        
        body[data-theme="glass"] {
            --theme-dark-bg: rgba(30, 41, 59, 0.6);
            --theme-dark-border: rgba(255, 255, 255, 0.25);
            --theme-text: #f1f5f9;
        }
        
        .configurator-ui {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .panel {
            background: var(--theme-dark-bg);
            backdrop-filter: blur(var(--theme-panel-blur));
            border-radius: 28px;
            padding: 20px 24px;
            border: 1px solid var(--theme-dark-border);
            pointer-events: auto;
            transition: var(--theme-transition);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            max-width: 460px;
            width: 100%;
        }
        
        .panel-secondary {
            background: var(--theme-dark-bg);
            backdrop-filter: blur(var(--theme-panel-blur));
            border-radius: 28px;
            padding: 16px 20px;
            border: 1px solid var(--theme-dark-border);
            pointer-events: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--theme-dark-border);
        }
        
        .panel-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--theme-text);
        }
        
        .brand-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--theme-primary-grad-start), var(--theme-primary-grad-end));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .model-status {
            font-size: 0.7rem;
            color: var(--theme-text-secondary);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 40px;
        }
        
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--theme-text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .color-picker-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .color-preset {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        
        .color-preset:hover {
            transform: scale(1.08);
            border-color: white;
        }
        
        .color-preset.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--theme-primary);
        }
        
        input[type="color"] {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            background: transparent;
        }
        
        .material-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .material-btn {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: var(--theme-text);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .material-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .material-btn.active {
            background: linear-gradient(135deg, var(--theme-primary-grad-start), var(--theme-primary-grad-end));
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .camera-presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .cam-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: var(--theme-text);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        
        .cam-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .export-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--theme-primary-grad-start), var(--theme-primary-grad-end));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--theme-text);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 3px dashed var(--theme-primary);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: white;
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        
        .drag-overlay.active {
            opacity: 1;
            pointer-events: none;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 200;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 3px solid var(--theme-primary);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .progress-bar-container {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 4px;
            z-index: 150;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .progress-bar-container.visible {
            opacity: 1;
        }
        
        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--theme-primary-grad-start), var(--theme-primary-grad-end));
            border-radius: 60px;
            width: 0%;
            transition: width 0.2s;
        }
        
        .progress-text {
            font-size: 0.7rem;
            color: white;
            margin-top: 6px;
            display: block;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .configurator-ui { left: 12px; right: 12px; bottom: 12px; flex-direction: column; align-items: stretch; }
            .panel { padding: 16px; max-width: none; }
            .color-preset { width: 38px; height: 38px; }
            .toast { bottom: 90px; white-space: normal; text-align: center; font-size: 0.75rem; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",

    <script type="module">
        // ============================================
        // ИМПОРТЫ
        // ============================================
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        const PRODUCT_CONFIG = {
            brand: { name: "ULTIMATE 3D", version: "2.0.0" },
            defaults: {
                modelUrl: "./models/sofa.glb",
                color: "#C41E3A",
                materialType: "standard",
                theme: "dark",
                autoRotate: false
            },
            colorPresets: [
                { name: "Красный", value: "#C41E3A" },
                { name: "Синий", value: "#1E88E5" },
                { name: "Черный", value: "#2C2C2C" },
                { name: "Золотой", value: "#E5C100" },
                { name: "Зеленый", value: "#76B83D" },
                { name: "Белый", value: "#F0F0F0" },
                { name: "Оранжевый", value: "#FF6600" }
            ],
            cameraPresets: {
                front: { pos: { x: 0, y: 0.8, z: 4.2 }, target: { x: 0, y: 0.6, z: 0 } },
                frontLeft: { pos: { x: 3.2, y: 1.2, z: 3.5 }, target: { x: 0, y: 0.6, z: 0 } },
                side: { pos: { x: 4.5, y: 0.9, z: 0 }, target: { x: 0, y: 0.6, z: 0 } },
                rear: { pos: { x: 0, y: 0.9, z: -4 }, target: { x: 0, y: 0.6, z: 0 } },
                top: { pos: { x: 0, y: 4.5, z: 0 }, target: { x: 0, y: 0.6, z: 0 } },
                reset: { pos: { x: 3.5, y: 2.2, z: 4.5 }, target: { x: 0, y: 0.6, z: 0 } }
            },
            materials: {
                presets: {
                    standard: { metalness: 0.35, roughness: 0.55, color: null },
                    metallic: { metalness: 0.92, roughness: 0.22, color: "#DDDDDD" },
                    matte: { metalness: 0.08, roughness: 0.85, color: null },
                    carbon: { metalness: 0.88, roughness: 0.28, color: "#1A1A1A" },
                    pearl: { metalness: 0.65, roughness: 0.28, color: "#F5E6D3" }
                }
            }
        };
        
        // ============================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================
        let scene, camera, renderer, controls;
        let currentModel = null;
        let currentColor = PRODUCT_CONFIG.defaults.color;
        let currentMaterialType = PRODUCT_CONFIG.defaults.materialType;
        let autoRotateFlag = false;
        let carbonTexture = null;
        
        // UI элементы
        const statusEl = document.getElementById('status-text');
        const toastEl = document.getElementById('toast');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        
        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function showToast(message, duration = 2500) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), duration);
        }
        
        function updateStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? '#ff6b6b' : '#4ade80';
        }
        
        function showProgress(percent, text) {
            if (percent > 0 && percent < 100) {
                progressContainer.classList.add('visible');
            } else if (percent >= 100) {
                setTimeout(() => progressContainer.classList.remove('visible'), 500);
            }
            progressBar.style.width = `${percent}%`;
            progressText.textContent = text || `${Math.floor(percent)}%`;
        }
        
        // ============================================
        // СОЗДАНИЕ ТЕКСТУРЫ КАРБОНА (реалистичное плетение)
        // ============================================
        function createCarbonTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Тёмная основа с лёгким градиентом для глубины
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#111');
            grad.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем основное плетение (ромбы)
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 14;
            const step = 56;
            
            for (let i = -canvas.width; i < canvas.width + canvas.height; i += step) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + canvas.height, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(i, canvas.height);
                ctx.lineTo(i - canvas.height, 0);
                ctx.stroke();
            }
            
            // Добавляем вторую сетку (более тонкую) для реалистичности
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 6;
            const step2 = step / 2;
            
            for (let i = -canvas.width; i < canvas.width + canvas.height; i += step2) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + canvas.height, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(i, canvas.height);
                ctx.lineTo(i - canvas.height, 0);
                ctx.stroke();
            }
            
            // Добавляем блики на пересечениях
            ctx.fillStyle = '#ccc';
            for (let x = -canvas.width; x < canvas.width + canvas.height; x += step) {
                for (let y = -canvas.height; y < canvas.height + canvas.width; y += step) {
                    ctx.beginPath();
                    ctx.arc(x + y * 0.5, y + x * 0.5, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            texture.anisotropy = 16;
            return texture;
        }
        
        // ============================================
        // SCENE MANAGER
        // ============================================
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3.5, 2.2, 4.5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 1.2;
            controls.zoomSpeed = 1.2;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.target.set(0, 0.6, 0);
            controls.update();
            
            // Вспомогательные элементы
            const gridHelper = new THREE.GridHelper(12, 24, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.85;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.2;
            scene.add(gridHelper);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            updateStatus("Сцена готова");
        }
        
        // ============================================
        // LIGHTING SYSTEM (улучшенное освещение)
        // ============================================
        function initLighting() {
            const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.3);
            mainLight.position.set(2.5, 3.2, 2.2);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x88aaff, 0.65);
            fillLight.position.set(-1.8, 1.5, 1.8);
            scene.add(fillLight);
            
            const rimLight = new THREE.PointLight(0xffaa77, 1.1);
            rimLight.position.set(1.3, 2.0, -2.5);
            scene.add(rimLight);
            
            const backLight = new THREE.PointLight(0x88aaff, 0.75);
            backLight.position.set(-0.8, 1.2, -3.0);
            scene.add(backLight);
            
            const bottomLight = new THREE.PointLight(0xccaa88, 0.5);
            bottomLight.position.set(0, -1.2, 0.8);
            scene.add(bottomLight);
            
            const fillLight2 = new THREE.PointLight(0xffaa88, 0.55);
            fillLight2.position.set(2.0, 1.0, 1.5);
            scene.add(fillLight2);
            
            console.log("✅ Lighting System готов");
        }
        
        // ============================================
        // MODEL LOADER
        // ============================================
        let loader = null;
        
        function initLoader() {
            loader = new GLTFLoader();
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
            loader.setDRACOLoader(dracoLoader);
        }
        
        function centerAndScaleModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const min = box.min;
            
            const targetHeight = 1.2;
            const maxDim = Math.max(size.x, size.y, size.z);
            let scale = targetHeight / maxDim;
            scale = Math.min(2.5, Math.max(0.3, scale));
            
            if (Math.abs(scale - 1) > 0.01) {
                model.scale.set(scale, scale, scale);
            }
            
            const newBox = new THREE.Box3().setFromObject(model);
            const newMin = newBox.min;
            const newCenter = newBox.getCenter(new THREE.Vector3());
            
            model.position.set(-newCenter.x, -newMin.y + 0.1, -newCenter.z);
            
            return model;
        }
        
        function setupModelShadows(model) {
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    child.visible = true;
                }
            });
        }
        
        async function loadModel(url) {
            if (!loader) initLoader();
            
            return new Promise((resolve, reject) => {
                showProgress(5, "Загрузка модели...");
                
                loader.load(url, (gltf) => {
                    const model = gltf.scene.clone(true);
                    centerAndScaleModel(model);
                    setupModelShadows(model);
                    
                    showProgress(100, "Готово");
                    setTimeout(() => showProgress(0, ""), 500);
                    resolve(model);
                }, (xhr) => {
                    if (xhr.total > 0) {
                        const percent = (xhr.loaded / xhr.total) * 100;
                        showProgress(percent, `Загрузка: ${Math.floor(percent)}%`);
                    }
                }, (error) => {
                    console.error("Ошибка:", error);
                    showProgress(0, "Ошибка загрузки");
                    reject(error);
                });
            });
        }
        
        async function replaceModel(url) {
            try {
                const newModel = await loadModel(url);
                if (currentModel) scene.remove(currentModel);
                scene.add(newModel);
                currentModel = newModel;
                updateStatus("Модель загружена");
                showToast("✅ Модель загружена");
                
                setTimeout(() => {
                    if (currentColor && currentModel) changeColor(currentColor);
                    applyMaterialType(currentMaterialType);
                }, 100);
                
                return true;
            } catch (error) {
                updateStatus("Ошибка загрузки", true);
                showToast("❌ Ошибка загрузки модели");
                return false;
            }
        }
        
        // ============================================
        // MATERIAL MANAGER (с поддержкой текстуры карбона)
        // ============================================
        function changeColor(hexColor) {
            if (!currentModel) return;
            if (currentMaterialType === 'carbon') {
                showToast("Карбон доступен только в чёрном цвете");
                return;
            }
            
            const color = new THREE.Color(hexColor);
            let changed = 0;
            
            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    const materials = Array.isArray(child.material) ? child.material : [child.material];
                    materials.forEach(mat => {
                        if (mat.color && mat.map !== carbonTexture) {
                            mat.color.set(color);
                            changed++;
                        }
                    });
                }
            });
            
            currentColor = hexColor;
            updateStatus(`Цвет: ${hexColor}`);
            if (changed > 0) showToast(`🎨 Цвет изменён`);
        }
        
        function applyMaterialType(type) {
            if (!currentModel) return;
            
            const preset = PRODUCT_CONFIG.materials.presets[type];
            if (!preset) return;
            
            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    const materials = Array.isArray(child.material) ? child.material : [child.material];
                    materials.forEach(mat => {
                        if (type === 'carbon' && carbonTexture) {
                            // Настоящий карбон с текстурой
                            mat.map = carbonTexture;
                            mat.metalness = preset.metalness;
                            mat.roughness = preset.roughness;
                            mat.color.setHex(0x222222);
                            mat.needsUpdate = true;
                        } else {
                            // Убираем текстуру для других материалов
                            if (mat.map === carbonTexture) mat.map = null;
                            if (mat.metalness !== undefined) mat.metalness = preset.metalness;
                            if (mat.roughness !== undefined) mat.roughness = preset.roughness;
                            
                            if (type === 'metallic') {
                                mat.color.setHex(0xDDDDDD);
                            } else if (type === 'pearl') {
                                mat.color.setHex(0xF5E6D3);
                            } else if (type === 'standard') {
                                mat.color.set(currentColor);
                            } else if (type === 'matte') {
                                mat.color.set(currentColor);
                            }
                            mat.needsUpdate = true;
                        }
                    });
                }
            });
            
            currentMaterialType = type;
            
            // Обновляем активную кнопку
            document.querySelectorAll('.material-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-material') === type) {
                    btn.classList.add('active');
                }
            });
            
            showToast(`✨ Материал: ${type === 'carbon' ? 'Карбон (текстурный)' : type}`);
        }
        
        // ============================================
        // UI CONTROLLERS
        // ============================================
        function initColorButtons() {
            const container = document.getElementById('color-palette');
            container.innerHTML = '';
            
            PRODUCT_CONFIG.colorPresets.forEach(preset => {
                const btn = document.createElement('div');
                btn.className = 'color-preset';
                btn.style.background = preset.value;
                btn.setAttribute('data-color', preset.value);
                btn.addEventListener('click', () => changeColor(preset.value));
                container.appendChild(btn);
            });
            
            const customPicker = document.createElement('input');
            customPicker.type = 'color';
            customPicker.id = 'custom-color';
            customPicker.value = currentColor;
            customPicker.addEventListener('change', (e) => changeColor(e.target.value));
            container.appendChild(customPicker);
        }
        
        function initCameraButtons() {
            const btns = document.querySelectorAll('.cam-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const preset = btn.getAttribute('data-cam');
                    if (preset === 'reset') {
                        camera.position.set(3.5, 2.2, 4.5);
                        controls.target.set(0, 0.6, 0);
                        controls.update();
                        showToast("🔄 Вид сброшен");
                    } else if (PRODUCT_CONFIG.cameraPresets[preset]) {
                        const p = PRODUCT_CONFIG.cameraPresets[preset];
                        camera.position.set(p.pos.x, p.pos.y, p.pos.z);
                        controls.target.set(p.target.x, p.target.y, p.target.z);
                        controls.update();
                    }
                });
            });
        }
        
        function takeScreenshot() {
            if (!renderer) return;
            const dataURL = renderer.domElement.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `3d-config-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
            showToast("📸 Скриншот сохранён");
        }
        
        function saveConfig() {
            const config = {
                color: currentColor,
                material: currentMaterialType,
                timestamp: Date.now()
            };
            localStorage.setItem('configurator-config', JSON.stringify(config));
            showToast("💾 Конфигурация сохранена");
        }
        
        function copyLink() {
            const url = new URL(window.location.href);
            url.searchParams.set('color', currentColor.substring(1));
            url.searchParams.set('material', currentMaterialType);
            navigator.clipboard.writeText(url.toString());
            showToast("🔗 Ссылка скопирована");
        }
        
        function toggleAutoRotate() {
            autoRotateFlag = !autoRotateFlag;
            controls.autoRotate = autoRotateFlag;
            const btn = document.getElementById('auto-rotate-toggle');
            if (btn) {
                btn.textContent = autoRotateFlag ? "⏸️ Автовращение" : "🔄 Автовращение";
            }
            showToast(autoRotateFlag ? "Автовращение вкл" : "Автовращение выкл");
        }
        
        function cycleTheme() {
            const themes = ['dark', 'light', 'glass'];
            const current = document.body.getAttribute('data-theme') || 'dark';
            const next = themes[(themes.indexOf(current) + 1) % themes.length];
            document.body.setAttribute('data-theme', next);
            showToast(`Тема: ${next}`);
        }
        
        function initDragAndDrop() {
            const dropZone = document.body;
            const overlay = document.getElementById('drag-overlay');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
                dropZone.addEventListener(ev, (e) => { e.preventDefault(); e.stopPropagation(); });
            });
            
            ['dragenter', 'dragover'].forEach(ev => {
                dropZone.addEventListener(ev, () => overlay.classList.add('active'));
            });
            
            ['dragleave', 'drop'].forEach(ev => {
                dropZone.addEventListener(ev, () => overlay.classList.remove('active'));
            });
            
            dropZone.addEventListener('drop', async (e) => {
                const file = e.dataTransfer.files[0];
                if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) {
                    const url = URL.createObjectURL(file);
                    await replaceModel(url);
                    URL.revokeObjectURL(url);
                } else {
                    showToast("Поддерживаются только GLB/GLTF файлы", 2000);
                }
            });
        }
        
        function loadFromUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const colorParam = params.get('color');
            if (colorParam) {
                setTimeout(() => changeColor(`#${colorParam}`), 500);
            }
            const materialParam = params.get('material');
            if (materialParam) {
                setTimeout(() => applyMaterialType(materialParam), 600);
            }
        }
        
        // ============================================
        // АНИМАЦИЯ
        // ============================================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        function initMaterialButtons() {
    const btns = document.querySelectorAll('.material-btn');
    btns.forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.getAttribute('data-material');
            if (type) applyMaterialType(type);
        });
    });
}
        // ============================================
        // ЗАПУСК
        // ============================================
        async function initApp() {
    carbonTexture = createCarbonTexture();
    initScene();
    initLighting();
    initColorButtons();
    initMaterialButtons();  // <-- добавил эту строку
    initCameraButtons();
    initDragAndDrop();
    
    document.getElementById('screenshot-btn')?.addEventListener('click', takeScreenshot);
    document.getElementById('save-config-btn')?.addEventListener('click', saveConfig);
    document.getElementById('copy-link-btn')?.addEventListener('click', copyLink);
    document.getElementById('auto-rotate-toggle')?.addEventListener('click', toggleAutoRotate);
    document.getElementById('theme-toggle')?.addEventListener('click', cycleTheme);
    
    loadFromUrlParams();
    
    await replaceModel(PRODUCT_CONFIG.defaults.modelUrl);
    
    animate();
    updateStatus("Готов к работе");
}
        
        initApp();
    </script>
